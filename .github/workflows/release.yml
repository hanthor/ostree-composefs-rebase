# Publish release binaries when a v* tag is pushed.
#
#   git tag -a v0.1.2 -m 'Release 0.1.2' && git push origin v0.1.2
#
# Builds an optimized binary per target on a NATIVE runner (no cross), then a
# single release job attaches all binaries (plus SHA-256 checksums) to the
# GitHub Release in one atomic `gh release create` — required because this
# account enforces immutable releases (assets must be present at creation;
# you cannot upload to a release after it is published).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          # build.rs reads the git SHA; a full checkout keeps that meaningful.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build + package
        run: |
          set -euo pipefail
          cargo build --release --target ${{ matrix.target }}
          name="bootc-migrate-composefs-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/bootc-migrate-composefs" "$name-bin"
          tar -C target/${{ matrix.target }}/release -czf "dist/$name.tar.gz" bootc-migrate-composefs
          sha256sum "dist/$name.tar.gz" | awk '{print $1}' > "dist/$name.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a tag push; workflow_dispatch builds without releasing.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - name: Create release with all assets (atomic — immutable-safe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ls -la dist/
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
